<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURO · Personaliza tu lata</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="../assets/fonts/fonts.css">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ overflow:hidden; }
  .cfg{ display:grid; grid-template-columns:1.3fr .9fr; height:100vh; }
  .cfg__stage{
    position:relative; display:grid; place-items:center; padding:24px;
    background:radial-gradient(60% 60% at 50% 45%, var(--blanco-calido), var(--crema) 78%);
  }
  .lata{ position:relative; height:min(82vh, 720px); }
  .lata img{ height:100%; width:auto; display:block; filter:saturate(1.03) contrast(1.02); }
  /* Grabado: fijo en el mismo sitio, centrado horizontalmente */
  .engrave{
    position:absolute; left:50%; transform:translate(-50%,-50%);
    width:62%; text-align:center; line-height:1.05; pointer-events:none;
    color:#caa64a; font-family:'Oswald',sans-serif; font-weight:700;
    text-transform:uppercase; letter-spacing:.02em; word-break:break-word;
    text-shadow:0 1px 0 rgba(255,255,255,.45), 0 -1px 1px rgba(40,30,8,.45);
  }
  .cfg__panel{ padding:clamp(22px,4vw,52px); overflow-y:auto; border-left:var(--line); display:flex; flex-direction:column; gap:18px; background:var(--crema); }
  .fld{ display:flex; flex-direction:column; gap:7px; }
  .fld > span{ font-family:var(--font-heading); font-weight:600; text-transform:uppercase; letter-spacing:.08em; font-size:.72rem; color:var(--verde-oliva); }
  .fld input[type=text], .fld select{ font-family:var(--font-body); font-size:1rem; padding:.7em .9em; border:1px solid var(--negro-oliva); border-radius:var(--radius); background:var(--blanco-calido); color:var(--negro-oliva); }
  .fld input[type=range]{ accent-color:var(--dorado); }
  .hint{ font-size:.82rem; color:var(--gris-texto); }
  .back{ margin-top:auto; font-size:.9rem; border-bottom:1.5px solid var(--dorado); align-self:flex-start; padding-bottom:2px; }
  .summary{ position:fixed; inset:0; background:color-mix(in srgb,var(--negro-oliva) 55%, transparent); display:none; place-items:center; padding:24px; z-index:10; }
  .summary.show{ display:grid; }
  .summary__card{ background:var(--blanco-calido); border-radius:var(--radius); padding:clamp(24px,4vw,44px); max-width:460px; text-align:center; box-shadow:var(--shadow-soft); }
  .summary__txt{ font-family:var(--font-editorial); font-style:italic; font-size:1.6rem; color:var(--verde-oliva); margin:10px 0 22px; }
  .summary__card .btn{ margin:6px 4px; }
  @media (max-width:820px){
    .cfg{ grid-template-columns:1fr; grid-template-rows:auto auto; height:auto; }
    body{ overflow:auto; }
    .lata{ height:min(60vh,460px); }
    .cfg__panel{ border-left:0; border-top:var(--line); }
  }
</style>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NSVQBTKM"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="cfg">
  <div class="cfg__stage">
    <div class="lata" id="lata">
      <img src="../assets/lata-auro.png" alt="Lata de AURO">
      <div class="engrave" id="engrave">PARA TI</div>
    </div>
  </div>

  <aside class="cfg__panel">
    <p class="kicker kicker--gold">Edición personalizada</p>
    <h1 style="font-size:clamp(1.6rem,2.4vw,2.2rem)">Graba tu lata</h1>
    <p class="hint">Escribe tu nombre, fecha o dedicatoria: se graba en la lata, siempre en el mismo sitio. Ajusta tamaño y altura a tu gusto.</p>

    <label class="fld"><span>Texto</span><input type="text" id="txt" maxlength="40" value="PARA TI"></label>
    <label class="fld"><span>Tipografía</span>
      <select id="font">
        <option value="Oswald">Oswald (display)</option>
        <option value="Cormorant Garamond">Cormorant (elegante)</option>
        <option value="Inter">Inter (limpia)</option>
      </select>
    </label>
    <label class="fld"><span>Tamaño</span><input type="range" id="size" min="0.035" max="0.12" step="0.005" value="0.06"></label>
    <label class="fld"><span>Altura</span><input type="range" id="pos" min="20" max="88" step="1" value="62"></label>

    <button class="btn btn-primary" id="confirm">Ver mi lata grabada</button>
    <a href="../index.html#producto" class="back">← Volver a la tienda</a>
  </aside>
</div>

<div class="summary" id="summary">
  <div class="summary__card">
    <p class="kicker kicker--gold">Tu lata personalizada</p>
    <p class="summary__txt" id="sumTxt"></p>
    <a href="../index.html#producto" class="btn btn-primary">Añadir al pedido</a>
    <button class="btn btn-secondary" id="closeSum">Seguir editando</button>
  </div>
</div>

<script>
(function () {
  const lata = document.getElementById('lata');
  const eng = document.getElementById('engrave');
  const txt = document.getElementById('txt');
  const font = document.getElementById('font');
  const size = document.getElementById('size');
  const pos = document.getElementById('pos');

  function render() {
    eng.textContent = txt.value || '';
    eng.style.fontFamily = '"' + font.value + '", sans-serif';
    eng.style.top = pos.value + '%';
    eng.style.fontSize = (parseFloat(size.value) * lata.clientWidth) + 'px';
  }
  [txt, font, size, pos].forEach((el) => el.addEventListener('input', render));
  addEventListener('resize', render);

  const img = lata.querySelector('img');
  if (img.complete) render(); else img.addEventListener('load', render);
  render();

  document.getElementById('confirm').addEventListener('click', () => {
    document.getElementById('sumTxt').textContent = '«' + ((txt.value || '').trim() || '—') + '»';
    document.getElementById('summary').classList.add('show');
  });
  document.getElementById('closeSum').addEventListener('click', () =>
    document.getElementById('summary').classList.remove('show'));
})();
</script>
</body>
</html>
