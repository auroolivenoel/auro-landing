<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURO · Fondo interactivo de olivos (PBR)</title>
<style>
  html,body{ margin:0; height:100%; background:#F5F0E8; overflow:hidden; }
  #c{ display:block; width:100vw; height:100vh; touch-action:none; cursor:pointer; }
  .wm{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
       font-family:'Oswald','Arial Narrow',sans-serif; font-weight:700; letter-spacing:.06em;
       font-size:clamp(2rem,7vw,5rem); color:#171713; opacity:.07; pointer-events:none; user-select:none; }
</style>
<!-- GSAP (global) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<!-- three.js r160 + addons vía import map -->
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}}
</script>
</head>
<body>
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NSVQBTKM"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->
<canvas id="c"></canvas>
<div class="wm">AURO</div>

<script type="module">
import * as THREE from 'three';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// URLs de polyhaven (si fallan por CORS, hay fallback). Para máxima fiabilidad,
// descárgalas y ponlas en ./assets/ y cambia estas constantes por rutas locales.
const BARK_DIFF = 'https://dl.polyhaven.org/file/ph-assets/Textures/jpg/1k/bark_willow/bark_willow_diff_1k.jpg';
const BARK_NOR  = 'https://dl.polyhaven.org/file/ph-assets/Textures/jpg/1k/bark_willow/bark_willow_nor_gl_1k.jpg';
const HDR_URL   = 'https://dl.polyhaven.org/file/ph-assets/HDRIs/hdr/1k/rural_landscape_1k.hdr';

const canvas = document.getElementById('c');
const rnd = (a, b) => a + Math.random() * (b - a);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0xF5F0E8, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();

let H = 1.6;
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 50);
camera.position.set(0, 0, 10);
function applyCam() {
  const a = innerWidth / innerHeight;
  camera.left = -H * a; camera.right = H * a; camera.top = H; camera.bottom = -H;
  camera.updateProjectionMatrix();
}
applyCam();

// ---------- Entorno: HDRI (PMREM) + fallback degradado ----------
const pmrem = new THREE.PMREMGenerator(renderer);
function gradientEnv() {
  const cv = document.createElement('canvas'); cv.width = 16; cv.height = 64;
  const x = cv.getContext('2d'); const g = x.createLinearGradient(0, 0, 0, 64);
  g.addColorStop(0, '#dfe7ef'); g.addColorStop(0.5, '#f1ead8'); g.addColorStop(1, '#9ba77e');
  x.fillStyle = g; x.fillRect(0, 0, 16, 64);
  const t = new THREE.CanvasTexture(cv); t.mapping = THREE.EquirectangularReflectionMapping;
  return pmrem.fromEquirectangular(t).texture;
}
new RGBELoader().load(HDR_URL, (hdr) => {
  hdr.mapping = THREE.EquirectangularReflectionMapping;
  scene.environment = pmrem.fromEquirectangular(hdr).texture;
  hdr.dispose();
}, undefined, () => { scene.environment = gradientEnv(); });
scene.environment = gradientEnv(); // provisional hasta que cargue el HDRI

// Solo una luz direccional muy suave para las sombras
const sun = new THREE.DirectionalLight(0xffffff, 0.3);
sun.position.set(-3, 4, 3);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
Object.assign(sun.shadow.camera, { left: -4, right: 4, top: 4, bottom: -4, near: 0.1, far: 25 });
scene.add(sun);

// Plano receptor de sombras (crema)
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0xF5F0E8, roughness: 1 })
);
floor.position.z = -0.4; floor.receiveShadow = true; scene.add(floor);

// ---------- Materiales PBR ----------
const barkMat = new THREE.MeshStandardMaterial({ color: 0x5C3D1E, roughness: 0.85, metalness: 0.0 });
const texLoader = new THREE.TextureLoader();
texLoader.load(BARK_DIFF, (t) => { t.colorSpace = THREE.SRGBColorSpace; t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1, 6); barkMat.map = t; barkMat.needsUpdate = true; });
texLoader.load(BARK_NOR,  (t) => { t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1, 6); barkMat.normalMap = t; barkMat.needsUpdate = true; });

const leafMat = new THREE.MeshPhysicalMaterial({
  color: 0x8BA84A, roughness: 0.6, metalness: 0.0,
  transmission: 0.15, thickness: 0.02, ior: 1.4, side: THREE.DoubleSide,
});

const oliveSphereGeo = new THREE.SphereGeometry(0.06, 32, 32);
const pedGeo = new THREE.CylinderGeometry(0.005, 0.005, 0.04, 6);
const pedMat = new THREE.MeshStandardMaterial({ color: 0x4A3A1E, roughness: 0.9 });

// Hoja lanceolada (4:1) con nervadura central elevada — geometría propia
function leafGeometry(L, W, segs) {
  const pos = [], uv = [], idx = [], ridge = 0.003;
  for (let i = 0; i <= segs; i++) {
    const u = i / segs, x = -L / 2 + u * L;
    const w = W * Math.pow(Math.sin(Math.PI * u), 0.65); // lanceolada (puntas)
    const z = ridge * Math.sin(Math.PI * u);             // nervadura elevada
    pos.push(x, -w, 0); uv.push(u, 0);
    pos.push(x, 0, z);  uv.push(u, 0.5);
    pos.push(x, w, 0);  uv.push(u, 1);
  }
  for (let i = 0; i < segs; i++) {
    const a = i * 3;
    idx.push(a, a + 1, a + 3, a + 1, a + 4, a + 3);
    idx.push(a + 1, a + 2, a + 4, a + 2, a + 5, a + 4);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}
const leafGeo = leafGeometry(0.12, 0.03, 12);

function makeOlive() {
  const black = Math.random() < 0.32;
  const mat = new THREE.MeshPhysicalMaterial({
    color: black ? 0x0D0D0D : 0x1C3A0F, roughness: 0.25, metalness: 0.0,
    clearcoat: 1.0, clearcoatRoughness: 0.1, sheen: 0.3, sheenColor: new THREE.Color(0xffffff),
  });
  const m = new THREE.Mesh(oliveSphereGeo, mat);
  m.castShadow = true; m.receiveShadow = true;
  m.scale.setScalar(rnd(0.8, 1.2));
  const ped = new THREE.Mesh(pedGeo, pedMat.clone());
  ped.position.y = 0.06; ped.castShadow = true;
  m.add(ped);
  return m;
}

// ---------- Construcción de ramas ----------
const interactive = [], branches = [], falling = [], tmp = new THREE.Object3D();

function genPoints(dir, len, segs, wob) {
  const pts = [new THREE.Vector3(0, 0, 0)], perp = new THREE.Vector2(-dir.y, dir.x);
  let acc = 0;
  for (let i = 1; i <= segs; i++) {
    const t = i / segs; acc += len / segs;
    const off = Math.sin(t * Math.PI * rnd(1, 1.8) + wob) * len * 0.18 * (1 - t * 0.3);
    pts.push(new THREE.Vector3(dir.x * acc + perp.x * off, dir.y * acc + perp.y * off, rnd(-0.05, 0.05)));
  }
  return pts;
}
function leavesAlong(curve, from, to, every, list) {
  for (let t = from; t <= to; t += every) {
    const p = curve.getPointAt(t), tan = curve.getTangentAt(t), ang = Math.atan2(tan.y, tan.x);
    for (const s of [1, -1]) list.push({ x: p.x, y: p.y, z: p.z, rz: ang + s * (Math.PI / 2) * rnd(0.7, 1.0), rx: rnd(-0.5, 0.5), s: rnd(0.7, 1.25) });
  }
}
function addHit(curve, radius, entry) {
  const hit = new THREE.Mesh(new THREE.TubeGeometry(curve, 24, radius, 4, false),
    new THREE.MeshBasicMaterial({ transparent: true, opacity: 0, depthWrite: false }));
  hit.userData.branch = entry; entry.shaker.add(hit); interactive.push(hit);
}
function cluster(shaker, pos, n, entry) {
  for (let i = 0; i < n; i++) {
    const o = makeOlive();
    o.position.set(pos.x + rnd(-0.05, 0.05), pos.y + rnd(-0.06, 0.04), pos.z + rnd(-0.03, 0.03));
    shaker.add(o); entry.olives.push(o);
  }
}
function makeBranch(bx, by, dir, len) {
  const swayer = new THREE.Group(); swayer.position.set(bx, by, rnd(-0.1, 0.1));
  const shaker = new THREE.Group(); swayer.add(shaker); scene.add(swayer);
  const entry = { swayer, shaker, olives: [], amp: rnd(0.025, 0.045), freq: rnd(0.4, 0.9), phase: rnd(0, 6.28), cd: 0 };
  branches.push(entry);
  const leaves = [];

  const mainPts = genPoints(dir, len, 5, rnd(0, 6.28));
  const main = new THREE.CatmullRomCurve3(mainPts);
  const mt = new THREE.Mesh(new THREE.TubeGeometry(main, 64, 0.008, 12, false), barkMat);
  mt.castShadow = true; mt.receiveShadow = true; shaker.add(mt);
  addHit(main, 0.05, entry);
  leavesAlong(main, 0.12, 0.96, 0.1, leaves);
  cluster(shaker, main.getPointAt(1), 2 + ((Math.random() * 3) | 0), entry);

  const subN = 1 + ((Math.random() * 2) | 0);
  for (let s = 0; s < subN; s++) {
    const t0 = rnd(0.35, 0.75), origin = main.getPointAt(t0), tan = main.getTangentAt(t0);
    const sign = Math.random() < 0.5 ? 1 : -1;
    const sdir = new THREE.Vector2(tan.x * 0.4 - tan.y * sign, tan.y * 0.4 + tan.x * sign).normalize();
    const sp = genPoints(sdir, len * rnd(0.4, 0.6), 4, rnd(0, 6.28)).map((p) => p.clone().add(origin));
    const sc = new THREE.CatmullRomCurve3(sp);
    const st = new THREE.Mesh(new THREE.TubeGeometry(sc, 40, 0.004, 8, false), barkMat);
    st.castShadow = true; st.receiveShadow = true; shaker.add(st);
    addHit(sc, 0.04, entry);
    leavesAlong(sc, 0.15, 0.95, 0.14, leaves);
    cluster(shaker, sc.getPointAt(1), 2 + ((Math.random() * 2) | 0), entry);
  }

  const inst = new THREE.InstancedMesh(leafGeo, leafMat, leaves.length);
  inst.castShadow = true; inst.receiveShadow = true;
  leaves.forEach((lf, i) => {
    tmp.position.set(lf.x, lf.y, lf.z); tmp.rotation.set(lf.rx, 0, lf.rz); tmp.scale.setScalar(lf.s);
    tmp.updateMatrix(); inst.setMatrixAt(i, tmp.matrix);
  });
  inst.instanceMatrix.needsUpdate = true; shaker.add(inst);
}

(function build() {
  const halfW = H * (innerWidth / innerHeight);
  makeBranch(-halfW * 0.99, rnd(-0.7, 0.5), new THREE.Vector2(1, rnd(-0.1, 0.25)).normalize(), rnd(1.7, 2.4));
  makeBranch(-halfW * 0.99, rnd(0.4, 0.95), new THREE.Vector2(1, rnd(-0.3, 0.0)).normalize(), rnd(1.4, 2.0));
  makeBranch(halfW * 0.99, rnd(-0.6, 0.5), new THREE.Vector2(-1, rnd(-0.1, 0.25)).normalize(), rnd(1.7, 2.4));
  makeBranch(halfW * 0.99, rnd(0.4, 0.95), new THREE.Vector2(-1, rnd(-0.25, 0.05)).normalize(), rnd(1.3, 1.9));
  makeBranch(rnd(-halfW * 0.5, -0.1), H * 0.99, new THREE.Vector2(rnd(-0.2, 0.2), -1).normalize(), rnd(1.4, 2.1));
  makeBranch(rnd(0.1, halfW * 0.5), H * 0.99, new THREE.Vector2(rnd(-0.2, 0.2), -1).normalize(), rnd(1.4, 2.1));
})();

// ---------- Interacción ----------
const raycaster = new THREE.Raycaster(), pointer = new THREE.Vector2();
function toPointer(e) { const r = canvas.getBoundingClientRect(); pointer.x = ((e.clientX - r.left) / r.width) * 2 - 1; pointer.y = -((e.clientY - r.top) / r.height) * 2 + 1; }
function pick() { raycaster.setFromCamera(pointer, camera); const h = raycaster.intersectObjects(interactive, false); return h.length ? h[0].object.userData.branch : null; }
function shake(entry) {
  const now = performance.now(); if (now < entry.cd) return; entry.cd = now + 800;
  gsap.killTweensOf(entry.shaker.rotation);
  gsap.timeline()
    .to(entry.shaker.rotation, { z: 0.14, duration: 0.07, ease: 'power2.out' })
    .to(entry.shaker.rotation, { z: -0.05, duration: 0.08 })
    .to(entry.shaker.rotation, { z: 0.03, duration: 0.08 })
    .to(entry.shaker.rotation, { z: 0, duration: 0.45, ease: 'elastic.out(1,0.4)' });
  release(entry, 1 + ((Math.random() * 3) | 0));
}
function release(entry, n) {
  for (let k = 0; k < n && entry.olives.length; k++) {
    const o = entry.olives.splice((Math.random() * entry.olives.length) | 0, 1)[0];
    scene.attach(o);
    falling.push({ mesh: o, ped: o.children[0], vel: new THREE.Vector3(rnd(-0.01, 0.01), rnd(0, 0.012), rnd(-0.005, 0.005)),
      spin: new THREE.Vector3(rnd(-0.08, 0.08), rnd(-0.08, 0.08), rnd(-0.08, 0.08)), born: performance.now(), fading: false, done: false });
  }
}
canvas.addEventListener('pointermove', (e) => { toPointer(e); const b = pick(); if (b) shake(b); });
canvas.addEventListener('pointerdown', (e) => { toPointer(e); const b = pick(); if (b) shake(b); });

// ---------- Loop ----------
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  for (const b of branches) b.swayer.rotation.z = Math.sin(t * b.freq + b.phase) * b.amp;
  for (let i = falling.length - 1; i >= 0; i--) {
    const o = falling[i];
    o.vel.y -= 0.002; o.mesh.position.add(o.vel);
    o.mesh.rotation.x += o.spin.x; o.mesh.rotation.y += o.spin.y; o.mesh.rotation.z += o.spin.z;
    if (o.mesh.position.y <= -1.5) { o.mesh.position.y = -1.5; o.vel.y *= -0.5; o.vel.x *= 0.6; o.spin.multiplyScalar(0.6); }
    if (!o.fading && performance.now() - o.born > 2000) {
      o.fading = true; o.mesh.material.transparent = true; o.ped.material.transparent = true;
      gsap.to([o.mesh.material, o.ped.material], { opacity: 0, duration: 0.6, onComplete: () => { o.done = true; } });
    }
    if (o.done) { scene.remove(o.mesh); falling.splice(i, 1); }
  }
  renderer.render(scene, camera);
}
function resize() { renderer.setSize(innerWidth, innerHeight); applyCam(); }
addEventListener('resize', resize);
resize(); animate();
</script>
</body>
</html>
