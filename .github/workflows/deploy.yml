name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez; cancela los anteriores en curso
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          # Habilita GitHub Pages automáticamente (build_type: workflow) si no
          # lo está, para que el despliegue no falle con "Pages site Not Found".
          enablement: true

      - name: Subir artefacto (sitio estático en la raíz)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
